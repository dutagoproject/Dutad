# DUTA mainnet example configuration

# Network selection
network=mainnet

# Data directory
datadir=/root/.duta/mainnet

# Local admin RPC only
rpcbind=127.0.0.1
rpcport=19083

# Public mining HTTP listener
# Leave disabled by default. Only enable explicit public/LAN exposure after firewall review.
# mining_bind=0.0.0.0:19085

# P2P bind
bind=0.0.0.0

# Optional bootstrap peers
# addnode=seed1.dutago.xyz
# addnode=seed2.dutago.xyz
# addnode=seed3.dutago.xyz
