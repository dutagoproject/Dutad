# DUTA testnet example configuration

# Network selection
testnet=1

# Data directory
datadir=/root/.duta/testnet

# Local admin RPC only
rpcbind=127.0.0.1
rpcport=18083

# Public mining HTTP listener
# Leave disabled by default. Only enable explicit public/LAN exposure after firewall review.
# mining_bind=0.0.0.0:18085

# P2P bind
bind=0.0.0.0
